<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 · clinic-booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <!-- 登入鎖定層 (Login Overlay) -->
    <div id="login-overlay" class="gh-login-overlay">
        <div class="gh-login-card">
            <svg class="gh-logo-dark" viewBox="0 0 16 16" fill="currentColor" width="48" height="48">
                <path
                    d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
            </svg>
            <h2>管理員登入</h2>
            <p>請輸入密碼以進入診所管理系統</p>
            <input type="password" id="admin-pwd-input" class="gh-input" placeholder="密碼"
                style="width: 100%; margin: 16px 0;">
            <button class="gh-btn-green" style="width: 100%; justify-content: center;"
                onclick="checkLogin()">登入</button>
            <div id="login-error" style="color: #cf222e; font-size: 13px; margin-top: 12px; display: none;">密碼錯誤，請重試
            </div>
        </div>
    </div>

    <!-- 頂部導覽列 (GitHub-style Header) -->
    <nav class="gh-navbar">
        <div class="gh-navbar-inner">
            <div class="gh-navbar-left">
                <svg class="gh-logo" viewBox="0 0 16 16" fill="currentColor">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                </svg>
                <span class="gh-repo-path">
                    <a href="#" class="gh-link-dim">bluefish1230</a>
                    <span class="gh-sep">/</span>
                    <a href="#" class="gh-link-bold">clinic-booking</a>
                </span>
                <span class="gh-badge-public">Public</span>
            </div>
            <div class="gh-navbar-right">
                <span class="gh-nav-tag">管理員模式</span>
                <button class="gh-btn-outline" onclick="fetchBookings()">更新清單</button>
                <button class="gh-btn-outline" onclick="logout()"
                    style="border-color: #cf222e; color: #cf222e;">登出</button>
            </div>
        </div>
    </nav>

    <!-- Repository Tab Bar -->
    <div class="gh-tab-bar">
        <div class="gh-tab-bar-inner">
            <nav class="gh-tabs">
                <button class="gh-tab active" onclick="switchTab('pending', this)" id="tab-pending">待審核 <span
                        class="gh-tab-count" id="pending-count">0</span></button>
                <button class="gh-tab" onclick="switchTab('all', this)" id="tab-all">全部預約 <span class="gh-tab-count"
                        id="all-count">0</span></button>
                <button class="gh-tab" onclick="switchTab('patients', this)" id="tab-patients">病患名單 <span
                        class="gh-tab-count" id="patients-count">0</span></button>
                <button class="gh-tab" onclick="switchTab('schedule', this)" id="tab-schedule">📅 行事曆</button>
                <button class="gh-tab" onclick="switchTab('calendar', this)" id="tab-calendar">日曆管理</button>
                <button class="gh-tab" onclick="switchTab('add', this)" id="tab-add">手動新增</button>
            </nav>
        </div>
    </div>

    <!-- 主要內容區域 -->
    <main class="gh-main">
        <div id="panel-pending" class="gh-panel active">
            <div class="gh-list-header"><span id="pending-header-count">0 筆待審核預約</span></div>
            <div id="pending-list" class="gh-list-body"></div>
        </div>

        <div id="panel-all" class="gh-panel">
            <div class="gh-list-header"><span id="all-header-count">0 筆已確認預約</span></div>
            <div id="all-list" class="gh-list-body"></div>
        </div>

        <div id="panel-patients" class="gh-panel">
            <div class="gh-list-header"><span id="patients-header-count">共 0 位病患</span></div>
            <div id="patients-list" class="gh-list-body"></div>
        </div>

        <!-- 依日期查詢行事曆 Tab -->
        <div id="panel-schedule" class="gh-panel">
            <div class="gh-list-header" style="justify-content: space-between; align-items: center;">
                <span>查詢特定日期的完整預約名單</span>
                <input type="date" id="schedule-date" class="gh-input" style="width: auto; margin-left: 10px;"
                    onchange="renderSchedule()">
            </div>
            <div id="schedule-list" class="gh-list-body">
                <div style="padding: 20px; text-align: center; color: #57606a;">請在上方的日曆選擇日期以查看預約</div>
            </div>
        </div>

        <!-- 日曆管理 Tab -->
        <div id="panel-calendar" class="gh-panel">
            <div class="gh-form-card" style="max-width: 800px;">
                <h2 class="gh-form-title">日曆例外設定</h2>
                <p class="gh-form-subtitle">設定特定日期為「強制開放」或「強制休假」（例如週六視訊看診或補假）。</p>
                <div class="gh-form-row" style="margin-bottom: 24px;">
                    <div class="gh-form-group">
                        <label class="gh-label">選擇日期</label>
                        <input type="date" id="cal-target-date" class="gh-input">
                    </div>
                    <div class="gh-form-group">
                        <label class="gh-label">設定狀態</label>
                        <select id="cal-status" class="gh-input">
                            <option value="1">強制開放預約</option>
                            <option value="0">強制關閉預約</option>
                        </select>
                    </div>
                    <div class="gh-form-group" style="justify-content: flex-end;">
                        <button class="gh-btn-green" onclick="setCalendarDate()">保存設定</button>
                    </div>
                </div>
                <h3>已生效的例外清單</h3>
                <div id="calendar-settings-list" class="gh-list-body"
                    style="margin-top: 12px; border-top: 1px solid #d0d7de;"></div>
            </div>
        </div>

        <div id="panel-add" class="gh-panel">
            <div class="gh-form-card">
                <h2 class="gh-form-title">手動新增預約</h2>
                <div class="gh-form-group">
                    <label class="gh-label">預約人姓名</label>
                    <input type="text" id="manual-name" class="gh-input">
                </div>
                <div class="gh-form-row">
                    <div class="gh-form-group"><label class="gh-label">預約日期</label><input type="date" id="manual-date"
                            class="gh-input"></div>
                    <div class="gh-form-group">
                        <label class="gh-label">選擇時段</label>
                        <select id="manual-slot" class="gh-input">
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                        </select>
                    </div>
                </div>
                <div class="gh-form-actions"><button class="gh-btn-green" onclick="adminCreateBooking()">建立預約</button>
                </div>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
    <script>
        function switchTab(tabName, btn) {
            document.querySelectorAll('.gh-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.gh-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('panel-' + tabName).classList.add('active');
            if (tabName === 'calendar') fetchCalendarSettings();
            if (tabName === 'schedule') {
                if (!document.getElementById('schedule-date').value) {
                    document.getElementById('schedule-date').value = new Date().toLocaleDateString('en-CA'); // 'YYYY-MM-DD' in local timezone
                }
                renderSchedule();
            }
            if (tabName === 'patients') renderPatients();
        }
    </script>
</body>

</html>
