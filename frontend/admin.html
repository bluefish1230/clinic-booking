<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 · clinic-booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <!-- 頂部導覽列 (GitHub-style Header) -->
    <nav class="gh-navbar">
        <div class="gh-navbar-inner">
            <div class="gh-navbar-left">
                <!-- GitHub Octocat Icon SVG -->
                <svg class="gh-logo" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                    0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
                    1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
                    0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68
                    0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
                    0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
                    8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                </svg>
                <span class="gh-repo-path">
                    <a href="#" class="gh-link-dim">bluefish1230</a>
                    <span class="gh-sep">/</span>
                    <a href="#" class="gh-link-bold">clinic-booking</a>
                </span>
                <span class="gh-badge-public">Public</span>
            </div>
            <div class="gh-navbar-right">
                <span class="gh-nav-tag">管理員模式</span>
                <button class="gh-btn-outline" onclick="fetchBookings()">
                    <svg viewBox="0 0 16 16" width="14" fill="currentColor">
                        <path
                            d="M8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.001 7.001 0 0114.95 7.16a.75.75 0 11-1.49.178A5.501 5.501 0 008 2.5zM1.705 8.005a.75.75 0 01.834.656 5.501 5.501 0 009.592 2.97l-1.204-1.204a.25.25 0 01.177-.427h3.646a.25.25 0 01.25.25v3.646a.25.25 0 01-.427.177l-1.38-1.38A7.001 7.001 0 011.05 8.84a.75.75 0 01.656-.834z" />
                    </svg>
                    重新整理
                </button>
            </div>
        </div>
    </nav>

    <!-- Repository Tab Bar -->
    <div class="gh-tab-bar">
        <div class="gh-tab-bar-inner">
            <nav class="gh-tabs">
                <button class="gh-tab active" onclick="switchTab('pending', this)" id="tab-pending">
                    <svg viewBox="0 0 16 16" width="14" fill="currentColor">
                        <path d="M8 9.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" />
                        <path fill-rule="evenodd"
                            d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0z" />
                    </svg>
                    待審核
                    <span class="gh-tab-count" id="pending-count">0</span>
                </button>
                <button class="gh-tab" onclick="switchTab('all', this)" id="tab-all">
                    <svg viewBox="0 0 16 16" width="14" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M1.5 2.75a.25.25 0 01.25-.25h12.5a.25.25 0 01.25.25v8.5a.25.25 0 01-.25.25h-6.5a.75.75 0 00-.53.22l-2.97 2.97V12.5a.75.75 0 00-.75-.75h-2a.25.25 0 01-.25-.25v-9.5zM1.75 1A1.75 1.75 0 000 2.75v9.5C0 13.216.784 14 1.75 14H3v1.543a1.457 1.457 0 002.487 1.03L8.061 14H14.25A1.75 1.75 0 0016 12.25v-9.5A1.75 1.75 0 0014.25 1H1.75z" />
                    </svg>
                    全部預約
                    <span class="gh-tab-count" id="all-count">0</span>
                </button>
                <button class="gh-tab" onclick="switchTab('add', this)" id="tab-add">
                    <svg viewBox="0 0 16 16" width="14" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z" />
                    </svg>
                    手動新增
                </button>
            </nav>
        </div>
    </div>

    <!-- 主要內容區域 -->
    <main class="gh-main">

        <!-- Tab: 待審核 -->
        <div id="panel-pending" class="gh-panel active">
            <div class="gh-list-header">
                <span id="pending-header-count">0 筆待審核預約</span>
            </div>
            <div id="pending-list" class="gh-list-body">
                <!-- 動態渲染 -->
            </div>
        </div>

        <!-- Tab: 全部預約 -->
        <div id="panel-all" class="gh-panel">
            <div class="gh-list-header">
                <span id="all-header-count">0 筆已確認預約</span>
            </div>
            <div id="all-list" class="gh-list-body">
                <!-- 動態渲染 -->
            </div>
        </div>

        <!-- Tab: 手動新增 -->
        <div id="panel-add" class="gh-panel">
            <div class="gh-form-card">
                <h2 class="gh-form-title">手動新增預約</h2>
                <p class="gh-form-subtitle">由管理員直接建立預約，建立後狀態自動設為「已核准」。</p>
                <div class="gh-form-group">
                    <label class="gh-label" for="manual-name">預約人姓名</label>
                    <input type="text" id="manual-name" class="gh-input" placeholder="輸入姓名或 LINE 暱稱">
                </div>
                <div class="gh-form-row">
                    <div class="gh-form-group">
                        <label class="gh-label" for="manual-date">預約日期</label>
                        <input type="date" id="manual-date" class="gh-input">
                    </div>
                    <div class="gh-form-group">
                        <label class="gh-label" for="manual-slot">選擇時段</label>
                        <select id="manual-slot" class="gh-input">
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                            <option value="16:00">16:00</option>
                            <option value="17:00">17:00</option>
                            <option value="18:00">18:00</option>
                            <option value="19:00">19:00</option>
                            <option value="20:00">20:00</option>
                            <option value="21:00">21:00</option>
                        </select>
                    </div>
                </div>
                <div class="gh-form-actions">
                    <button class="gh-btn-green" onclick="adminCreateBooking()">
                        <svg viewBox="0 0 16 16" width="14" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z" />
                        </svg>
                        建立預約
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script src="admin.js"></script>
    <script>
        function switchTab(tabName, btn) {
            document.querySelectorAll('.gh-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.gh-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('panel-' + tabName).classList.add('active');
        }
    </script>
</body>

</html>
